app:
  timezone: "Asia/Shanghai"
  show_version_update: true
schedule:
  enabled: true
  preset: morning_evening
platforms:
  enabled: true
  sources:
    - id: toutiao
      name: "今日头条"
    - id: baidu
      name: "百度热搜"
    - id: wallstreetcn-hot
      name: "华尔街见闻 最热"
    - id: wallstreetcn-news
      name: "华尔街见闻 最新"
    - id: zhihu
      name: "知乎"
    - id: ithome
      name: "IT之家"
    - id: juejin
      name: "掘金"
    - id: github
      name: "GitHub"
    - id: hackernews
      name: "Hacker News"
    - id: solidot
      name: "Solidot"
rss:
  enabled: true
  freshness_filter:
    enabled: true
    max_age_days: 2
  feeds:
    - id: hacker-news
      name: "Hacker News"
      url: "https://hnrss.org/frontpage"
    - id: ruanyifeng
      name: "阮一峰的网络日志"
      url: "http://www.ruanyifeng.com/blog/atom.xml"
      max_age_days: 7
report:
  mode: current
  display_mode: keyword
  sort_by_position_first: false
  rank_threshold: 5
  max_news_per_keyword: 5
display:
  region_order:
    - ai_analysis
    - new_items
    - hotlist
    - rss
  regions:
    hotlist: true
    new_items: true
    rss: true
    standalone: false
    ai_analysis: true
  standalone:
    platforms:
      - zhihu
      - wallstreetcn-hot
    max_items: 15
notification:
  enabled: true
  channels:
    telegram:
      bot_token: ""
      chat_id: ""
    bark:
      url: ""
ai:
  model: "openai/GLM-4.7-Flash"
  api_key: ""
  api_base: ""
  timeout: 120
  temperature: 1
  max_tokens: 4096
  num_retries: 2
ai_analysis:
  enabled: true
  language: "Chinese"
  mode: follow_report
  max_news_for_analysis: 150
  include_rss: true
  include_standalone: true
  include_rank_timeline: true
ai_translation:
  enabled: true
  language: "中文"
storage:
  backend: auto
  formats:
    sqlite: true
    html: true
  local:
    data_dir: output
    retention_days: 30
